<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-600 min-h-screen flex items-center justify-center">

<div class="bg-white w-[350px] p-8 rounded-2xl shadow-2xl">

    <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">
        Login
    </h2>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <p class="text-green-600 text-center mb-2">{{ message }}</p>
    {% endfor %}
    {% endwith %}

    <form method="POST" class="space-y-3">

        <!-- FIXED HERE -->
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold">
            Login
        </button>

    </form>

    <a href="/signup" class="block text-center mt-4 text-blue-600 text-sm">
        Create Account
    </a>

</div>

</body>
</html>
