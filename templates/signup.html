<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Smart Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-600 min-h-screen flex items-center justify-center">

<div class="bg-white w-[350px] p-8 rounded-2xl shadow-2xl">

    <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">
        Create Account
    </h2>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="mb-3 text-sm p-2 rounded text-center
                {% if category == 'danger' %} bg-red-100 text-red-700 {% endif %}
                {% if category == 'success' %} bg-green-100 text-green-700 {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <form method="POST" class="space-y-3">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select> 

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold">
            Sign Up
        </button>

    </form>

    <div class="text-center mt-4 text-sm space-y-1">

        <p class="text-gray-600">Already have an account?</p>

        <!-- LINKS -->
        <a href="/login" class="text-blue-600 block">
            Login Here
        </a>

    </div>

</div>

</body>
</html>
